name: PR AI Docs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-pr-docs:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Collect detailed PR changes with full diffs
        id: changes
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            const analyzedFiles = files.map((f) => {
              const patch = f.patch || "";
              const lines = patch.split('\n');

              let changeType = 'modified';
              if (f.status === 'added') changeType = 'added';
              else if (f.status === 'removed') changeType = 'deleted';
              else if (f.status === 'renamed') changeType = 'renamed';

              const addedLines = lines.filter(l => l.startsWith('+')).map(l => l.slice(1));
              const removedLines = lines.filter(l => l.startsWith('-')).map(l => l.slice(1));

              const functionPattern = /^[\s]*(async\s+)?(function|const|let|class|export|interface|type)\s+([a-zA-Z_$][a-zA-Z0-9_$]*)/;
              const importPattern = /^[\s]*(import|require)\s+/;
              const configPattern = /\.(json|yaml|yml|toml|config|env|properties)$/i;

              const addedFunctions = addedLines
                .map(l => l.match(functionPattern)?.[3])
                .filter(Boolean);
              const removedFunctions = removedLines
                .map(l => l.match(functionPattern)?.[3])
                .filter(Boolean);
              const hasImportChanges = addedLines.some(l => l.match(importPattern)) ||
                                       removedLines.some(l => l.match(importPattern));
              const isConfigFile = configPattern.test(f.filename);

              return {
                filename: f.filename,
                status: f.status,
                changeType,
                additions: f.additions,
                deletions: f.deletions,
                // Increased from 8000 to 20000 — the more diff AI sees, the more concrete it can be
                patch: patch.slice(0, 20000),
                summary: {
                  isConfigFile,
                  hasImportChanges,
                  addedFunctions: addedFunctions.slice(0, 10),
                  removedFunctions: removedFunctions.slice(0, 10),
                  linesAdded: addedLines.length,
                  linesRemoved: removedLines.length
                }
              };
            });

            const totalAdditions = analyzedFiles.reduce((sum, f) => sum + f.additions, 0);
            const totalDeletions = analyzedFiles.reduce((sum, f) => sum + f.deletions, 0);

            const categorized = {
              frontend: analyzedFiles.filter(f => /\.(tsx?|jsx?)$/i.test(f.filename) && !/test|spec/.test(f.filename)),
              styling: analyzedFiles.filter(f => /\.(css|scss|sass|less)$/i.test(f.filename)),
              config: analyzedFiles.filter(f => f.summary.isConfigFile),
              tests: analyzedFiles.filter(f => /test|spec/i.test(f.filename)),
              backend: analyzedFiles.filter(f => /\.(py|js|ts|java|cs|rb|go|rs)$/i.test(f.filename) && !/test|spec/.test(f.filename) && !/(tsx?|jsx?)$/.test(f.filename)),
              other: analyzedFiles.filter(f => !/(\.tsx?|\.jsx?|\.css|\.scss|\.sass|\.less|test|spec|json|yaml|yml|toml|config|env|properties)$/i.test(f.filename))
            };

            core.setOutput("changes_json", JSON.stringify(analyzedFiles));
            core.setOutput("categorized_json", JSON.stringify(categorized));
            core.setOutput("stats", JSON.stringify({
              fileCount: analyzedFiles.length,
              additions: totalAdditions,
              deletions: totalDeletions,
              frontendFiles: categorized.frontend.length,
              backendFiles: categorized.backend.length,
              configFiles: categorized.config.length,
              testFiles: categorized.tests.length,
              styleFiles: categorized.styling.length
            }));

      - name: Generate comprehensive PR analysis with AI
        id: ai
        uses: actions/github-script@v8
        env:
          CHANGES_JSON: ${{ steps.changes.outputs.changes_json }}
          CATEGORIZED_JSON: ${{ steps.changes.outputs.categorized_json }}
          STATS_JSON: ${{ steps.changes.outputs.stats }}
          AI_MODEL: gpt-4.1-mini
          AI_ENDPOINT: https://models.inference.ai.azure.com/chat/completions
        with:
          script: |
            const changes = JSON.parse(process.env.CHANGES_JSON || "[]");
            const categorized = JSON.parse(process.env.CATEGORIZED_JSON || "{}");
            const stats = JSON.parse(process.env.STATS_JSON || "{}");

            // ── Fallback: builds human-readable bullets directly from the patch ────────
            const generateDetailedFallback = () => {
              const sections = ["## Summary"];

              sections.push(`This PR contains **${stats.fileCount} file changes** with **${stats.additions} additions** and **${stats.deletions} deletions**.`);

              if (stats.frontendFiles > 0) sections.push(`- **Frontend**: ${stats.frontendFiles} file(s) modified`);
              if (stats.backendFiles > 0) sections.push(`- **Backend**: ${stats.backendFiles} file(s) modified`);
              if (stats.configFiles > 0) sections.push(`- **Configuration**: ${stats.configFiles} file(s) modified`);
              if (stats.styleFiles > 0) sections.push(`- **Styling**: ${stats.styleFiles} file(s) modified`);
              if (stats.testFiles > 0) sections.push(`- **Tests**: ${stats.testFiles} file(s) modified`);

              sections.push("");
              sections.push("## What Changed");

              // Helper: extract concrete diff facts from a patch string
              const extractDiffFacts = (patch, filename) => {
                if (!patch) return [];
                const facts = [];
                const lines = patch.split('\n');
                const added = lines.filter(l => l.startsWith('+')).map(l => l.slice(1).trim()).filter(Boolean);
                const removed = lines.filter(l => l.startsWith('-')).map(l => l.slice(1).trim()).filter(Boolean);

                // CSS / style value changes  →  "color: red" became "color: blue"
                const cssValuePair = /^([\w-]+)\s*:\s*(.+?);?$/;
                removed.forEach(r => {
                  const rm = r.match(cssValuePair);
                  if (!rm) return;
                  const [, prop, oldVal] = rm;
                  const counterpart = added.find(a => {
                    const am = a.match(cssValuePair);
                    return am && am[1] === prop;
                  });
                  if (counterpart) {
                    const [, , newVal] = counterpart.match(cssValuePair);
                    if (oldVal.trim() !== newVal.trim()) {
                      facts.push(`Changed \`${prop}\` from \`${oldVal.trim()}\` to \`${newVal.trim()}\``);
                    }
                  }
                });

                // String / text literal changes
                const stringLiteralPattern = /["'`]([^"'`]{4,80})["'`]/;
                removed.forEach(r => {
                  const rm = r.match(stringLiteralPattern);
                  if (!rm) return;
                  const counterpart = added.find(a => {
                    const am = a.match(stringLiteralPattern);
                    return am && am[1] !== rm[1] && Math.abs(a.length - r.length) < 60;
                  });
                  if (counterpart) {
                    const [, newText] = counterpart.match(stringLiteralPattern);
                    facts.push(`Changed text from "${rm[1]}" to "${newText}"`);
                  }
                });

                // New functions / exports added
                const fnPattern = /^(?:export\s+)?(?:async\s+)?(?:function|const|class)\s+([A-Z][a-zA-Z0-9]+)/;
                added.forEach(l => {
                  const m = l.match(fnPattern);
                  if (m) facts.push(`Added \`${m[1]}\``);
                });

                // Removed functions
                removed.forEach(l => {
                  const m = l.match(fnPattern);
                  if (m && !added.some(a => a.includes(m[1]))) {
                    facts.push(`Removed \`${m[1]}\``);
                  }
                });

                return facts.slice(0, 6); // cap to keep description tidy
              };

              const renderGroup = (label, files) => {
                if (!files?.length) return;
                sections.push(`### ${label}`);
                files.slice(0, 10).forEach(f => {
                  const facts = extractDiffFacts(f.patch, f.filename);
                  let line = `- **${f.filename}** (${f.status}, +${f.additions}/-${f.deletions})`;
                  if (facts.length > 0) {
                    line += "\n" + facts.map(fact => `  - ${fact}`).join("\n");
                  } else if (f.summary.addedFunctions.length > 0) {
                    line += ` — added: ${f.summary.addedFunctions.join(', ')}`;
                  }
                  sections.push(line);
                });
              };

              renderGroup("Frontend Components", categorized.frontend);
              renderGroup("Backend Logic", categorized.backend);
              renderGroup("Styling & UI", categorized.styling);
              renderGroup("Configuration", categorized.config);
              renderGroup("Tests", categorized.tests);

              sections.push("");
              sections.push("## Testing");
              if (stats.testFiles > 0) {
                sections.push(`- ✓ Test files included (${stats.testFiles} file(s) modified)`);
                sections.push("- Run the test suite to validate changes: `npm test` or equivalent");
              } else {
                sections.push("- No automated tests were detected in this diff");
              }
              sections.push("- Manual validation recommended for all modified components");
              if (categorized.frontend?.length > 0) sections.push("- Test frontend components: render, interaction, and responsive design");
              if (categorized.backend?.length > 0) sections.push("- Test backend logic: API endpoints, data processing, error handling");

              sections.push("");
              sections.push("## Risks and Review Notes");
              const risks = [];
              if (stats.deletions > stats.additions * 2) risks.push("- Large number of deletions — verify removed code is no longer needed");
              if (categorized.config?.length > 0) risks.push("- Configuration changes may affect runtime behavior — review carefully");
              if (categorized.backend?.length > 0 && stats.frontendFiles === 0) risks.push("- Backend changes without corresponding frontend updates — verify data contracts");
              if (!stats.testFiles || stats.testFiles === 0) risks.push("- No tests included — additional manual testing required");
              if (risks.length === 0) risks.push("- No major risks identified — standard code review recommended");
              sections.push(risks.join("\n"));

              return sections.join("\n");
            };

            const generateDetailedChangelog = () => {
              const sections = ["# Changelog"];

              sections.push(""); sections.push("## Added");
              const addedItems = changes.filter(f => f.status === 'added').map(f => `- ${f.filename}`);
              const newFunctions = changes
                .flatMap(f => f.summary.addedFunctions.map(fn => `- New function: \`${fn}\` in ${f.filename}`))
                .slice(0, 5);
              if (addedItems.length > 0 || newFunctions.length > 0) {
                sections.push(...addedItems, ...newFunctions);
              } else {
                sections.push("- No new files or functions added");
              }

              sections.push(""); sections.push("## Changed");
              const changedItems = changes
                .filter(f => f.status === 'modified')
                .map(f => {
                  let detail = `- ${f.filename}`;
                  if (f.summary.hasImportChanges) detail += " (dependencies updated)";
                  return detail;
                });
              sections.push(...(changedItems.length > 0 ? changedItems : ["- No files modified"]));

              sections.push(""); sections.push("## Fixed");
              sections.push("- See individual commit messages for bug fixes");

              sections.push(""); sections.push("## Technical");
              const technical = [];
              if (categorized.config?.length > 0) technical.push(`- Configuration updated (${categorized.config.length} file(s))`);
              if (changes.some(f => f.summary.hasImportChanges)) technical.push("- Dependencies or imports updated");
              if (stats.testFiles > 0) technical.push(`- Test coverage updated (${stats.testFiles} file(s))`);
              sections.push(...(technical.length > 0 ? technical : ["- No breaking technical changes"]));

              sections.push(""); sections.push("## Notes");
              sections.push(`- Total changes: ${stats.fileCount} files, +${stats.additions}/-${stats.deletions} lines`);
              if (stats.frontendFiles > 0) sections.push(`- Frontend impact: ${stats.frontendFiles} file(s)`);
              if (stats.backendFiles > 0) sections.push(`- Backend impact: ${stats.backendFiles} file(s)`);

              return sections.join("\n");
            };

            let prDescription = generateDetailedFallback();
            let changelog = generateDetailedChangelog();

            // ── Build the AI prompt with the FULL patch content ───────────────────────
            //
            // Key change: we pass the raw patch lines to the model so it can reason
            // about exact values (colors, labels, logic branches, etc.) rather than
            // just file names and line counts.
            //
            const fileDetailsForAI = changes.map(f => {
              // Send the full patch but cap total payload per file to avoid token overflow.
              // Priority: include all added (+) and removed (-) lines; trim context lines (@@ …) if needed.
              const patchLines = (f.patch || "").split('\n');
              const importantLines = patchLines.filter(l => l.startsWith('+') || l.startsWith('-') || l.startsWith('@@'));
              const contextLines = patchLines.filter(l => !l.startsWith('+') && !l.startsWith('-') && !l.startsWith('@@'));
              // Build a trimmed patch: all important lines + first 5 context lines for orientation
              const trimmedPatch = [
                ...importantLines,
                ...contextLines.slice(0, 5)
              ].join('\n').slice(0, 12000);

              return {
                filename: f.filename,
                status: f.status,
                additions: f.additions,
                deletions: f.deletions,
                patch: trimmedPatch,
                summary: f.summary
              };
            });

            const prompt = [
              "You are an experienced senior software engineer writing a Pull Request summary for a MIXED audience:",
              "product managers, designers, QA testers, and developers.",
              "",
              "## Your primary job",
              "Read every line of every diff below and describe WHAT actually changed in plain language.",
              "Be SPECIFIC and CONCRETE. Avoid vague phrases like 'updated component' or 'refactored logic'.",
              "",
              "## Rules",
              "✓ Describe the actual change: 'Changed the submit button color from #ccc to #3b82f6 (blue)'",
              "✓ If a label or text string changed, say what it was and what it is now",
              "✓ If a function was renamed, say old name → new name",
              "✓ If a new API endpoint was added, name it",
              "✓ If a config value changed (timeout, URL, flag), state old vs new value",
              "✓ If a component was restructured, describe the visible/behavioral outcome",
              "✓ Group bullets logically (UI changes / logic changes / config changes / fixes)",
              "✗ Do NOT say 'files were modified' — explain what the modification does",
              "✗ Do NOT repeat file names unless the name itself is meaningful context",
              "✗ Do NOT invent changes — only describe what you see in the diffs",
              "✗ Do NOT use jargon without explaining it",
              "",
              "## Output format",
              "Return STRICT JSON ONLY — no markdown fences, no preamble:",
              "{",
              "  \"pr_description\": \"<markdown string>\",",
              "  \"changelog\": \"<markdown string>\"",
              "}",
              "",
              "### pr_description structure",
              "## Summary",
              "2-4 sentences: what problem does this PR solve, or what feature does it add?",
              "Write as if explaining to a non-technical colleague.",
              "",
              "## What Changed",
              "Concrete bullet points, grouped by area (UI / Logic / Config / Tests).",
              "Each bullet must describe the actual change, not just the file.",
              "Examples of GOOD bullets:",
              "- Changed the 'Cancel' button label to 'Go Back' on the checkout page",
              "- The login form now shows an inline error message instead of an alert popup",
              "- Increased the session timeout from 30 minutes to 60 minutes",
              "- Added a new `/api/v2/users/export` endpoint that returns a CSV file",
              "- Fixed a bug where clicking 'Save' twice would submit the form twice",
              "",
              "## Testing",
              "What should reviewers test manually? Be specific about the user flows.",
              "",
              "## Risks and Review Notes",
              "Flag anything a reviewer should pay extra attention to.",
              "",
              "### changelog structure",
              "Standard Added / Changed / Fixed / Technical / Notes sections.",
              "Same rule: concrete descriptions, not file names.",
              "",
              "─────────────────────────────────────",
              "PR Title: " + context.payload.pull_request.title,
              "PR Body: " + (context.payload.pull_request.body || "(no description provided)"),
              "",
              "Stats:",
              JSON.stringify(stats, null, 2),
              "",
              "Full diff per file:",
              JSON.stringify(fileDetailsForAI, null, 2)
            ].join("\n");

            try {
              const response = await fetch(process.env.AI_ENDPOINT, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`
                },
                body: JSON.stringify({
                  model: process.env.AI_MODEL,
                  messages: [
                    {
                      role: "system",
                      content: [
                        "You are a senior engineer and technical writer.",
                        "You read git diffs carefully and translate them into plain-language descriptions.",
                        "You always describe WHAT changed (values, labels, behavior), not WHERE (file names).",
                        "You write for a mixed audience of developers, designers, and product managers.",
                        "You return only valid JSON with keys pr_description and changelog."
                      ].join(" ")
                    },
                    {
                      role: "user",
                      content: prompt
                    }
                  ],
                  temperature: 0.2,        // lower = more faithful to the actual diff
                  max_tokens: 2000,
                  response_format: { type: "json_object" }
                })
              });

              if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`AI request failed with status ${response.status}: ${errorText}`);
              }

              const data = await response.json();
              const content = data?.choices?.[0]?.message?.content;

              if (content) {
                const parsed = JSON.parse(content);
                if (parsed?.pr_description && parsed.pr_description.trim().length > 50) {
                  prDescription = parsed.pr_description;
                }
                if (parsed?.changelog && parsed.changelog.trim().length > 50) {
                  changelog = parsed.changelog;
                }
              }
            } catch (error) {
              core.warning(`AI generation encountered an issue, using enhanced fallback: ${error.message}`);
              core.info("Fallback provides detailed analysis based on file changes and diff content");
            }

            core.setOutput("pr_description", prDescription);
            core.setOutput("changelog", changelog);

      - name: Update PR description
        uses: actions/github-script@v8
        env:
          PR_DESCRIPTION: ${{ steps.ai.outputs.pr_description }}
        with:
          script: |
            const body = process.env.PR_DESCRIPTION;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body
            });

            core.info("✓ PR description updated with detailed analysis");

      - name: Write changelog file
        run: |
          cat > CHANGELOG_PR.md << 'EOF'
          # Changelog for PR #${{ github.event.pull_request.number }}

          Generated automatically on: $(date -u +'%Y-%m-%d %H:%M:%S UTC')

          ${{ steps.ai.outputs.changelog }}
          EOF
          cat CHANGELOG_PR.md

      - name: Commit and push changelog
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG_PR.md

          if git diff --cached --quiet; then
            echo "ℹ️ No changelog changes to commit"
            exit 0
          fi

          git commit -m "chore: auto-generate changelog for PR #${{ github.event.pull_request.number }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

          echo "✓ Changelog updated and pushed"

      - name: Comment on PR with status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const summary = `
            ✨ **Automated Analysis Complete**

            - **Files analyzed**: ${{ fromJson(steps.changes.outputs.stats).fileCount }}
            - **Lines changed**: +${{ fromJson(steps.changes.outputs.stats).additions }}/-${{ fromJson(steps.changes.outputs.stats).deletions }}
            - **Changelog**: Generated as CHANGELOG_PR.md

            See the PR description above for detailed analysis.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            }).catch(err => core.warning("Could not post comment: " + err.message));
