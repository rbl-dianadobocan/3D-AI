name: PR AI Docs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-pr-docs:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Collect PR file changes
        id: changes
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            const compact = files.map((f) => ({
              filename: f.filename,
              status: f.status,
              additions: f.additions,
              deletions: f.deletions,
              patch: (f.patch || "").slice(0, 6000)
            }));

            const totalAdditions = compact.reduce((sum, f) => sum + f.additions, 0);
            const totalDeletions = compact.reduce((sum, f) => sum + f.deletions, 0);

            core.setOutput("changes_json", JSON.stringify(compact));
            core.setOutput("stats", JSON.stringify({
              fileCount: compact.length,
              additions: totalAdditions,
              deletions: totalDeletions
            }));

      - name: Generate PR description and changelog with AI
        id: ai
        uses: actions/github-script@v8
        env:
          CHANGES_JSON: ${{ steps.changes.outputs.changes_json }}
          STATS_JSON: ${{ steps.changes.outputs.stats }}
          AI_MODEL: gpt-4.1-mini
          AI_ENDPOINT: https://models.inference.ai.azure.com/chat/completions
        with:
          script: |
            const changes = JSON.parse(process.env.CHANGES_JSON || "[]");
            const stats = JSON.parse(process.env.STATS_JSON || "{}");

            const fallbackDescription = [
              "## Summary",
              `This PR updates ${stats.fileCount || 0} file(s), with ${stats.additions || 0} additions and ${stats.deletions || 0} deletions.`,
              "The AI-generated description could not be created, so this fallback summary was generated from the changed files.",
              "",
              "## What Changed",
              ...changes.slice(0, 25).map((f) => `- ${f.filename} was ${f.status} (+${f.additions}/-${f.deletions}).`),
              "",
              "## Technical Details",
              "- Review the changed files listed above for implementation details.",
              "",
              "## Testing",
              "- No automated test information was detected by the fallback generator.",
              "- Please validate the affected functionality manually.",
              "",
              "## Risks and Review Notes",
              "- This description was generated without AI analysis, so reviewers should inspect the diff carefully."
            ].join("\n");

            const fallbackChangelog = [
              "# Changelog",
              "",
              "## Added",
              "- No changes.",
              "",
              "## Changed",
              ...changes.slice(0, 50).map((f) => `- ${f.filename} was ${f.status} (+${f.additions}/-${f.deletions}).`),
              "",
              "## Fixed",
              "- No changes.",
              "",
              "## Technical",
              `- Updated ${stats.fileCount || 0} file(s) in this pull request.`,
              "",
              "## Notes",
              "- AI changelog generation failed, so this fallback changelog was generated from file metadata."
            ].join("\n");

            const prompt = [
              "You are an experienced senior software engineer and release manager.",
              "Your job is to analyze a GitHub Pull Request diff and generate documentation that is clear, detailed, human-readable, and useful for reviewers.",
              "",
              "Return STRICT JSON only with the following keys:",
              "- pr_description",
              "- changelog",
              "",
              "General rules:",
              "- Do not invent changes that are not visible in the diff.",
              "- Focus on user impact, developer impact, and review-relevant details.",
              "- Write in clear, natural English.",
              "- Avoid generic phrases like 'updated files' or 'made changes'.",
              "- Explain WHY the changes matter when it can be inferred from the diff.",
              "- Group related changes together.",
              "- Mention important files, components, workflows, scripts, or configuration changes.",
              "- If the diff is small, keep the output concise but still meaningful.",
              "- If the diff is large, organize the output into readable sections.",
              "",
              "The pr_description must be Markdown and must use this exact structure:",
              "",
              "## Summary",
              "- Provide 2-4 human-readable sentences explaining the purpose of the PR.",
              "- Explain the problem solved or improvement introduced.",
              "- Mention the main area of the application affected.",
              "",
              "## What Changed",
              "- Use grouped bullet points.",
              "- Each bullet should explain what changed and why it matters.",
              "- Mention relevant files or modules only when useful.",
              "",
              "## Technical Details",
              "- Explain important implementation details.",
              "- Mention new components, functions, workflows, data structures, API calls, or configuration changes.",
              "- Keep this section useful for code reviewers.",
              "",
              "## Testing",
              "- Describe likely testing based on the changes.",
              "- If tests are visible in the diff, mention them specifically.",
              "- If no tests are visible, say: 'No automated tests were detected in this diff.'",
              "- Suggest manual validation steps.",
              "",
              "## Risks and Review Notes",
              "- Mention possible risks, edge cases, or areas that deserve extra attention.",
              "- If no obvious risk exists, say: 'No major risks identified from the diff.'",
              "",
              "The changelog must be Markdown suitable for a CHANGELOG_PR.md file and must use this exact structure:",
              "",
              "# Changelog",
              "",
              "## Added",
              "- List new features, components, workflows, or capabilities.",
              "",
              "## Changed",
              "- List behavior changes, refactors, UI updates, or improvements.",
              "",
              "## Fixed",
              "- List bug fixes or corrected behavior.",
              "",
              "## Technical",
              "- List internal implementation details, dependency/configuration changes, CI/CD changes, or developer tooling updates.",
              "",
              "## Notes",
              "- Include anything reviewers or release managers should know.",
              "",
              "If a changelog section has no relevant items, write:",
              "- No changes.",
              "",
              "Pull Request context:",
              "",
              "PR title:",
              context.payload.pull_request.title,
              "",
              "PR body:",
              context.payload.pull_request.body || "",
              "",
              "Stats:",
              JSON.stringify(stats),
              "",
              "Changed files and patches:",
              JSON.stringify(changes)
            ].join("\n");

            let prDescription = fallbackDescription;
            let changelog = fallbackChangelog;

            try {
              const response = await fetch(process.env.AI_ENDPOINT, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`
                },
                body: JSON.stringify({
                  model: process.env.AI_MODEL,
                  messages: [
                    {
                      role: "system",
                      content: "You are GitHub Copilot acting as a senior code reviewer and release note writer."
                    },
                    {
                      role: "user",
                      content: prompt
                    }
                  ],
                  temperature: 0.2,
                  response_format: {
                    type: "json_object"
                  }
                })
              });

              if (!response.ok) {
                throw new Error(`AI request failed with status ${response.status}`);
              }

              const data = await response.json();
              const content = data?.choices?.[0]?.message?.content;
              const parsed = JSON.parse(content);

              if (parsed?.pr_description) {
                prDescription = parsed.pr_description;
              }

              if (parsed?.changelog) {
                changelog = parsed.changelog;
              }
            } catch (error) {
              core.warning(`AI generation failed, using fallback: ${error.message}`);
            }

            core.setOutput("pr_description", prDescription);
            core.setOutput("changelog", changelog);

      - name: Update PR description
        uses: actions/github-script@v8
        env:
          PR_DESCRIPTION: ${{ steps.ai.outputs.pr_description }}
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: process.env.PR_DESCRIPTION
            });

      - name: Write changelog file
        run: |
          cat > CHANGELOG_PR.md << 'EOF'
          # Changelog for PR #${{ github.event.pull_request.number }}

          ${{ steps.ai.outputs.changelog }}
          EOF

      - name: Commit and push changelog
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG_PR.md

          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi

          git commit -m "chore: update PR changelog #${{ github.event.pull_request.number }}"
          git push