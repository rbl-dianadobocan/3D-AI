name: PR AI Docs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-pr-docs:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Collect detailed PR changes with full diffs
        id: changes
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            const analyzedFiles = files.map((f) => {
              const patch = f.patch || "";
              const lines = patch.split('\n');
              
              let changeType = 'modified';
              if (f.status === 'added') changeType = 'added';
              else if (f.status === 'removed') changeType = 'deleted';
              else if (f.status === 'renamed') changeType = 'renamed';
              
              const addedLines = lines.filter(l => l.startsWith('+')).map(l => l.slice(1));
              const removedLines = lines.filter(l => l.startsWith('-')).map(l => l.slice(1));
              
              const functionPattern = /^[\s]*(async\s+)?(function|const|let|class|export|interface|type)\s+([a-zA-Z_$][a-zA-Z0-9_$]*)/;
              const importPattern = /^[\s]*(import|require)\s+/;
              const configPattern = /\.(json|yaml|yml|toml|config|env|properties)$/i;
              
              const addedFunctions = addedLines
                .map(l => l.match(functionPattern)?.[3])
                .filter(Boolean);
              const removedFunctions = removedLines
                .map(l => l.match(functionPattern)?.[3])
                .filter(Boolean);
              const hasImportChanges = addedLines.some(l => l.match(importPattern)) || 
                                       removedLines.some(l => l.match(importPattern));
              const isConfigFile = configPattern.test(f.filename);
              
              return {
                filename: f.filename,
                status: f.status,
                changeType: changeType,
                additions: f.additions,
                deletions: f.deletions,
                patch: patch.slice(0, 10000),
                summary: {
                  isConfigFile,
                  hasImportChanges,
                  addedFunctions: addedFunctions.slice(0, 5),
                  removedFunctions: removedFunctions.slice(0, 5),
                  linesAdded: addedLines.length,
                  linesRemoved: removedLines.length
                }
              };
            });

            const totalAdditions = analyzedFiles.reduce((sum, f) => sum + f.additions, 0);
            const totalDeletions = analyzedFiles.reduce((sum, f) => sum + f.deletions, 0);
            
            const categorized = {
              frontend: analyzedFiles.filter(f => /\.(tsx?|jsx?)$/i.test(f.filename) && !/test|spec/.test(f.filename)),
              styling: analyzedFiles.filter(f => /\.(css|scss|sass|less)$/i.test(f.filename)),
              config: analyzedFiles.filter(f => f.summary.isConfigFile),
              tests: analyzedFiles.filter(f => /test|spec/i.test(f.filename)),
              backend: analyzedFiles.filter(f => /\.(py|js|ts|java|cs|rb|go|rs)$/i.test(f.filename) && !/test|spec/.test(f.filename) && !/(tsx?|jsx?)$/.test(f.filename)),
              other: analyzedFiles.filter(f => !/(\.tsx?|\.jsx?|\.css|\.scss|\.sass|\.less|test|spec|json|yaml|yml|toml|config|env|properties)$/i.test(f.filename))
            };

            core.setOutput("changes_json", JSON.stringify(analyzedFiles));
            core.setOutput("categorized_json", JSON.stringify(categorized));
            core.setOutput("stats", JSON.stringify({
              fileCount: analyzedFiles.length,
              additions: totalAdditions,
              deletions: totalDeletions,
              frontendFiles: categorized.frontend.length,
              backendFiles: categorized.backend.length,
              configFiles: categorized.config.length,
              testFiles: categorized.tests.length,
              styleFiles: categorized.styling.length
            }));

      - name: Generate comprehensive PR analysis with AI
        id: ai
        uses: actions/github-script@v8
        env:
          CHANGES_JSON: ${{ steps.changes.outputs.changes_json }}
          CATEGORIZED_JSON: ${{ steps.changes.outputs.categorized_json }}
          STATS_JSON: ${{ steps.changes.outputs.stats }}
          AI_MODEL: gpt-4.1-mini
          AI_ENDPOINT: https://models.inference.ai.azure.com/chat/completions
        with:
          script: |
            const changes = JSON.parse(process.env.CHANGES_JSON || "[]");
            const categorized = JSON.parse(process.env.CATEGORIZED_JSON || "{}");
            const stats = JSON.parse(process.env.STATS_JSON || "{}");

            const generateDetailedFallback = () => {
              const sections = ["## Summary"];
              
              sections.push(`This PR contains **${stats.fileCount} file changes** with **${stats.additions} additions** and **${stats.deletions} deletions**.`);
              
              if (stats.frontendFiles > 0) sections.push(`- **Frontend**: ${stats.frontendFiles} file(s) modified`);
              if (stats.backendFiles > 0) sections.push(`- **Backend**: ${stats.backendFiles} file(s) modified`);
              if (stats.configFiles > 0) sections.push(`- **Configuration**: ${stats.configFiles} file(s) modified`);
              if (stats.styleFiles > 0) sections.push(`- **Styling**: ${stats.styleFiles} file(s) modified`);
              if (stats.testFiles > 0) sections.push(`- **Tests**: ${stats.testFiles} file(s) modified`);
              
              sections.push("");
              sections.push("## What Changed");
              
              if (categorized.frontend?.length > 0) {
                sections.push("### Frontend Components");
                categorized.frontend.slice(0, 10).forEach(f => {
                  let detail = `- **${f.filename}** (${f.status})`;
                  if (f.summary.addedFunctions.length > 0) {
                    detail += ` - Added: ${f.summary.addedFunctions.join(', ')}`;
                  }
                  if (f.summary.hasImportChanges) {
                    detail += ` - Dependencies updated`;
                  }
                  detail += ` (+${f.additions}/-${f.deletions})`;
                  sections.push(detail);
                });
              }
              
              if (categorized.backend?.length > 0) {
                sections.push("### Backend Logic");
                categorized.backend.slice(0, 10).forEach(f => {
                  let detail = `- **${f.filename}** (${f.status})`;
                  if (f.summary.addedFunctions.length > 0) {
                    detail += ` - Added: ${f.summary.addedFunctions.join(', ')}`;
                  }
                  detail += ` (+${f.additions}/-${f.deletions})`;
                  sections.push(detail);
                });
              }
              
              if (categorized.styling?.length > 0) {
                sections.push("### Styling & UI");
                categorized.styling.forEach(f => {
                  sections.push(`- **${f.filename}** (+${f.additions}/-${f.deletions})`);
                });
              }
              
              if (categorized.config?.length > 0) {
                sections.push("### Configuration");
                categorized.config.forEach(f => {
                  sections.push(`- **${f.filename}** - Configuration updated (+${f.additions}/-${f.deletions})`);
                });
              }
              
              if (categorized.tests?.length > 0) {
                sections.push("### Tests");
                categorized.tests.slice(0, 10).forEach(f => {
                  sections.push(`- **${f.filename}** (+${f.additions}/-${f.deletions})`);
                });
              }
              
              sections.push("");
              sections.push("## Technical Details");
              sections.push("- Review the diff details for implementation specifics");
              
              if (categorized.frontend?.length > 0 && categorized.frontend.some(f => f.summary.hasImportChanges)) {
                sections.push("- Component dependencies have been updated");
              }
              if (categorized.config?.length > 0) {
                sections.push("- Configuration files modified - ensure environment is properly configured");
              }
              if (stats.testFiles > 0) {
                sections.push(`- Tests updated (${stats.testFiles} file(s))`);
              }
              
              sections.push("");
              sections.push("## Testing");
              if (stats.testFiles > 0) {
                sections.push(`- ✓ Test files included (${stats.testFiles} file(s) modified)`);
                sections.push("- Run the test suite to validate changes: `npm test` or equivalent");
              } else {
                sections.push("- No automated tests were detected in this diff");
              }
              sections.push("- Manual validation recommended for all modified components");
              
              if (categorized.frontend?.length > 0) {
                sections.push("- Test frontend components: render, interaction, and responsive design");
              }
              if (categorized.backend?.length > 0) {
                sections.push("- Test backend logic: API endpoints, data processing, error handling");
              }
              
              sections.push("");
              sections.push("## Risks and Review Notes");
              
              const risks = [];
              if (stats.deletions > stats.additions * 2) {
                risks.push("- Large number of deletions - verify removed code is no longer needed");
              }
              if (categorized.config?.length > 0) {
                risks.push("- Configuration changes may affect runtime behavior - review carefully");
              }
              if (categorized.backend?.length > stats.frontendFiles && stats.frontendFiles === 0) {
                risks.push("- Backend changes without corresponding frontend updates - verify data contracts");
              }
              if (!stats.testFiles || stats.testFiles === 0) {
                risks.push("- No tests included - additional manual testing required");
              }
              
              if (risks.length === 0) {
                risks.push("- No major risks identified - standard code review recommended");
              }
              
              sections.push(risks.join("\n"));
              
              return sections.join("\n");
            };

            const generateDetailedChangelog = () => {
              const sections = ["# Changelog"];
              
              sections.push("");
              sections.push("## Added");
              const addedItems = changes
                .filter(f => f.status === 'added')
                .map(f => `- ${f.filename}`);
              
              const newFunctions = changes
                .flatMap(f => f.summary.addedFunctions.map(fn => `- New function: \`${fn}\` in ${f.filename}`))
                .slice(0, 5);
              
              if (addedItems.length > 0 || newFunctions.length > 0) {
                sections.push(...addedItems);
                sections.push(...newFunctions);
              } else {
                sections.push("- No new files or functions added");
              }
              
              sections.push("");
              sections.push("## Changed");
              const changedItems = changes
                .filter(f => f.status === 'modified')
                .map(f => {
                  let detail = `- ${f.filename}`;
                  if (f.summary.hasImportChanges) detail += " (dependencies updated)";
                  return detail;
                });
              
              if (changedItems.length > 0) {
                sections.push(...changedItems);
              } else {
                sections.push("- No files modified");
              }
              
              sections.push("");
              sections.push("## Fixed");
              sections.push("- See individual commit messages for bug fixes");
              
              sections.push("");
              sections.push("## Technical");
              const technical = [];
              if (categorized.config?.length > 0) {
                technical.push(`- Configuration updated (${categorized.config.length} file(s))`);
              }
              if (changes.some(f => f.summary.hasImportChanges)) {
                technical.push("- Dependencies or imports updated");
              }
              if (stats.testFiles > 0) {
                technical.push(`- Test coverage updated (${stats.testFiles} file(s))`);
              }
              
              if (technical.length > 0) {
                sections.push(...technical);
              } else {
                sections.push("- No breaking technical changes");
              }
              
              sections.push("");
              sections.push("## Notes");
              sections.push(`- Total changes: ${stats.fileCount} files, +${stats.additions}/-${stats.deletions} lines`);
              if (stats.frontendFiles > 0) sections.push(`- Frontend impact: ${stats.frontendFiles} file(s)`);
              if (stats.backendFiles > 0) sections.push(`- Backend impact: ${stats.backendFiles} file(s)`);
              
              return sections.join("\n");
            };

            let prDescription = generateDetailedFallback();
            let changelog = generateDetailedChangelog();

            const diffContent = changes.map((f, idx) => {
              return `FILE ${idx + 1}: ${f.filename}\nSTATUS: ${f.status}\nSTATS: +${f.additions}/-${f.deletions}\nCONTENT:\n${f.patch}\n---`;
            }).join('\n\n');

            const prompt = `You are a senior software engineer analyzing GitHub Pull Requests.
Analyze the ACTUAL DIFF CONTENT and provide detailed technical documentation.

Return ONLY valid JSON:
{"pr_description": "markdown", "changelog": "markdown"}

PR Title: ${context.payload.pull_request.title}
PR Body: ${context.payload.pull_request.body || ""}

Files: ${stats.fileCount}, +${stats.additions}/-${stats.deletions}

DIFF:
${diffContent}

Analyze this diff and provide:
1. pr_description: Clear explanation of what changed and why
2. changelog: Organized changelog entries (Added/Changed/Fixed/Technical/Notes)

Be specific, mention actual function/component names, explain impact.`;

            try {
              const response = await fetch(process.env.AI_ENDPOINT, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`
                },
                body: JSON.stringify({
                  model: process.env.AI_MODEL,
                  messages: [
                    {
                      role: "system",
                      content: "You are GitHub Copilot. Analyze code diffs and return valid JSON only."
                    },
                    {
                      role: "user",
                      content: prompt
                    }
                  ],
                  temperature: 0.4,
                  max_tokens: 3000,
                  response_format: {
                    type: "json_object"
                  }
                })
              });

              if (!response.ok) {
                throw new Error(`AI request failed with status ${response.status}`);
              }

              const data = await response.json();
              const content = data?.choices?.[0]?.message?.content;
              
              if (content) {
                try {
                  const parsed = JSON.parse(content);
                  
                  if (parsed?.pr_description && parsed.pr_description.trim().length > 100) {
                    prDescription = parsed.pr_description;
                  }
                  
                  if (parsed?.changelog && parsed.changelog.trim().length > 50) {
                    changelog = parsed.changelog;
                  }
                } catch (e) {
                  core.warning(`Failed to parse AI response: ${e.message}`);
                }
              }
            } catch (error) {
              core.warning(`AI generation failed: ${error.message}`);
            }

            core.setOutput("pr_description", prDescription);
            core.setOutput("changelog", changelog);

      - name: Update PR description
        uses: actions/github-script@v8
        env:
          PR_DESCRIPTION: ${{ steps.ai.outputs.pr_description }}
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: process.env.PR_DESCRIPTION
            });

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update CHANGELOG.md
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_DATE=$(date -u +'%Y-%m-%d')
          NEW_CHANGELOG="${{ steps.ai.outputs.changelog }}"
          
          # Create temp file with new entry
          cat > /tmp/new_entry.md << 'ENTRY'
          ## PR #${PR_NUMBER} - ${PR_TITLE}
          **Author**: @${PR_AUTHOR}  
          **Date**: ${PR_DATE}
          
          ${NEW_CHANGELOG}
          
          ---
          
          ENTRY
          
          # Check if CHANGELOG.md exists
          if [ -f CHANGELOG.md ]; then
            # Prepend new entry to existing changelog
            cat /tmp/new_entry.md CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          else
            # Create new changelog with header
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "All notable changes to this project will be documented in this file." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "---" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat /tmp/new_entry.md >> CHANGELOG.md
          fi

      - name: Commit and push CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add CHANGELOG.md
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: update CHANGELOG.md for PR #${{ github.event.pull_request.number }}"
          git push origin main
