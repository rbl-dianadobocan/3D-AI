name: PR AI Docs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-pr-docs:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Collect detailed PR changes with full diffs
        id: changes
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            const analyzedFiles = files
              .filter((f) => f.filename !== "CHANGELOG.md")
              .map((f) => {
                const patch = f.patch || "";
                const lines = patch.split("\n");

                let changeType = "modified";
                if (f.status === "added") changeType = "added";
                else if (f.status === "removed") changeType = "deleted";
                else if (f.status === "renamed") changeType = "renamed";

                const addedLines = lines
                  .filter((line) => line.startsWith("+") && !line.startsWith("+++"))
                  .map((line) => line.slice(1));

                const removedLines = lines
                  .filter((line) => line.startsWith("-") && !line.startsWith("---"))
                  .map((line) => line.slice(1));

                const functionPattern = /^[\s]*(async\s+)?(function|const|let|class|export|interface|type)\s+([a-zA-Z_$][a-zA-Z0-9_$]*)/;
                const importPattern = /^[\s]*(import|require)\s+/;
                const configPattern = /\.(json|yaml|yml|toml|config|env|properties)$/i;

                const addedFunctions = addedLines
                  .map((line) => line.match(functionPattern)?.[3])
                  .filter(Boolean);

                const removedFunctions = removedLines
                  .map((line) => line.match(functionPattern)?.[3])
                  .filter(Boolean);

                const hasImportChanges =
                  addedLines.some((line) => line.match(importPattern)) ||
                  removedLines.some((line) => line.match(importPattern));

                const isConfigFile = configPattern.test(f.filename);

                return {
                  filename: f.filename,
                  status: f.status,
                  changeType,
                  additions: f.additions,
                  deletions: f.deletions,
                  patch: patch.slice(0, 15000),
                  summary: {
                    isConfigFile,
                    hasImportChanges,
                    addedFunctions: addedFunctions.slice(0, 5),
                    removedFunctions: removedFunctions.slice(0, 5),
                    linesAdded: addedLines.length,
                    linesRemoved: removedLines.length
                  }
                };
              });

            const totalAdditions = analyzedFiles.reduce((sum, file) => sum + file.additions, 0);
            const totalDeletions = analyzedFiles.reduce((sum, file) => sum + file.deletions, 0);

            const categorized = {
              frontend: analyzedFiles.filter((file) => /\.(tsx?|jsx?)$/i.test(file.filename) && !/test|spec/i.test(file.filename)),
              styling: analyzedFiles.filter((file) => /\.(css|scss|sass|less)$/i.test(file.filename)),
              config: analyzedFiles.filter((file) => file.summary.isConfigFile),
              tests: analyzedFiles.filter((file) => /test|spec/i.test(file.filename)),
              backend: analyzedFiles.filter((file) =>
                /\.(py|js|ts|java|cs|rb|go|rs)$/i.test(file.filename) &&
                !/test|spec/i.test(file.filename) &&
                !/(tsx?|jsx?)$/i.test(file.filename)
              ),
              other: analyzedFiles.filter((file) =>
                !/(\.tsx?|\.jsx?|\.css|\.scss|\.sass|\.less|test|spec|json|yaml|yml|toml|config|env|properties)$/i.test(file.filename)
              )
            };

            core.setOutput("changes_json", JSON.stringify(analyzedFiles));
            core.setOutput("categorized_json", JSON.stringify(categorized));
            core.setOutput("stats", JSON.stringify({
              fileCount: analyzedFiles.length,
              additions: totalAdditions,
              deletions: totalDeletions,
              frontendFiles: categorized.frontend.length,
              backendFiles: categorized.backend.length,
              configFiles: categorized.config.length,
              testFiles: categorized.tests.length,
              styleFiles: categorized.styling.length
            }));

      - name: Generate comprehensive PR analysis with AI
        id: ai
        uses: actions/github-script@v8
        env:
          CHANGES_JSON: ${{ steps.changes.outputs.changes_json }}
          CATEGORIZED_JSON: ${{ steps.changes.outputs.categorized_json }}
          STATS_JSON: ${{ steps.changes.outputs.stats }}
          AI_MODEL: gpt-4o
          AI_ENDPOINT: https://models.inference.ai.azure.com/chat/completions
        with:
          script: |
            const changes = JSON.parse(process.env.CHANGES_JSON || "[]");
            const categorized = JSON.parse(process.env.CATEGORIZED_JSON || "{}");
            const stats = JSON.parse(process.env.STATS_JSON || "{}");

            const generateDetailedFallback = () => {
              const sections = ["## Summary"];
              sections.push(`This PR updates ${stats.fileCount} file(s), with ${stats.additions} additions and ${stats.deletions} deletions.`);
              sections.push("");
              sections.push("The changes should be reviewed manually because the AI-generated description could not be created.");
              sections.push("");
              sections.push("## What Changed");
              changes.forEach((file) => {
                sections.push(`- ${file.filename} was ${file.status} (+${file.additions}/-${file.deletions}).`);
              });
              sections.push("");
              sections.push("## Testing");
              sections.push("- Run the affected application flows manually.");
              sections.push("- Run the existing automated test suite.");
              sections.push("");
              sections.push("## Risks and Review Notes");
              sections.push("- Review the diff carefully before merging.");
              return sections.join("\n");
            };

            const generateDetailedChangelog = () => {
              const sections = [];
              sections.push("### Added");
              const addedItems = changes
                .filter((file) => file.status === "added")
                .map((file) => `- Added \`${file.filename}\`.`);
              sections.push(...(addedItems.length > 0 ? addedItems : ["- No new files were added."]));

              sections.push("");
              sections.push("### Changed");
              const changedItems = changes
                .filter((file) => file.status === "modified")
                .map((file) => `- Updated \`${file.filename}\` (+${file.additions}/-${file.deletions}).`);
              sections.push(...(changedItems.length > 0 ? changedItems : ["- No existing files were modified."]));

              sections.push("");
              sections.push("### Testing");
              if (stats.testFiles > 0) {
                sections.push("- Automated test files were updated.");
              } else {
                sections.push("- No automated test files were detected in this PR.");
              }

              sections.push("");
              sections.push("### Notes");
              sections.push(`- Total scope: ${stats.fileCount} file(s), +${stats.additions}/-${stats.deletions} lines.`);

              return sections.join("\n");
            };

            let prDescription = generateDetailedFallback();
            let changelog = generateDetailedChangelog();

            const diffContent = changes.map((file, index) => {
              return `FILE ${index + 1}: ${file.filename}
            STATUS: ${file.status}
            STATS: +${file.additions}/-${file.deletions}
            PATCH:
            ${file.patch}
            ---`;
            }).join("\n\n");

            const prompt = `
            You are a Staff Software Engineer, Technical Lead, Code Reviewer, and Project Documentation Specialist.

            Your task is to analyze the ACTUAL Pull Request diff and generate documentation that is useful for:
            - developers;
            - reviewers;
            - technical leads;
            - project managers.

            Return ONLY valid JSON with this exact shape:

            {
              "pr_description": "markdown",
              "changelog": "markdown"
            }

            Do not include any text outside the JSON.

            ==================================================
            PR CONTEXT
            ==================================================

            Title:
            ${context.payload.pull_request.title}

            Description:
            ${context.payload.pull_request.body || "(no description)"}

            Statistics:
            - Files changed: ${stats.fileCount}
            - Additions: ${stats.additions}
            - Deletions: ${stats.deletions}
            - Frontend files: ${stats.frontendFiles}
            - Backend files: ${stats.backendFiles}
            - Config files: ${stats.configFiles}
            - Test files: ${stats.testFiles}
            - Styling files: ${stats.styleFiles}

            ==================================================
            DIFF CONTENT
            ==================================================

            ${diffContent}

            ==================================================
            PR DESCRIPTION REQUIREMENTS
            ==================================================

            Write the PR description in natural, clear, human-readable language.

            Avoid generating a simple technical inventory like:
            - "Added function X"
            - "Updated imports"
            - "Modified file Y"

            Instead, interpret the code changes and explain what they mean in practice.

            The PR description must include these sections:

            ## Summary
            Explain in 2-4 clear paragraphs what this PR does overall.
            The summary must be understandable for both a project manager and a developer.
            Explain the purpose of the change, not only the files that changed.

            ## What Changed
            Explain the changes step by step in natural language.
            Group related changes together by feature, flow, UI area, state management, context/provider, component, or technical layer.
            For each group, explain:
            - what was changed;
            - why the change seems necessary;
            - how the behavior is different after this PR;
            - which user or developer flow is affected.

            ## Application Impact
            Explain which part of the application is affected.
            Mention affected pages, components, UI flows, filters, charts, context providers, state handling, or shared UI elements when visible from the diff.
            Explain the practical impact for users and for developers.

            ## Technical Details
            Explain the important technical implementation details in readable language.
            Mention new state/context, props, constants, helper functions, filtering logic, range handling, data transformation, or UI wiring if visible in the diff.
            Do not simply list imports unless the import change has a meaningful impact.

            ## Testing
            Provide concrete manual testing recommendations based on the actual diff.
            Include specific flows that should be checked.
            If no automated tests were changed, say that clearly and explain what manual validation is especially important.

            ## Risks and Review Notes
            Mention possible risks, edge cases, regression areas, or things reviewers should pay attention to.
            If the change affects filters, charts, shared UI, context, layout, or date/range handling, call that out explicitly.
            Keep the tone helpful, not alarmist.

            ==================================================
            CHANGELOG REQUIREMENTS
            ==================================================

            Generate a developer-friendly changelog.

            The changelog must be structured and detailed, but still readable.

            Use this structure:

            ### Added
            Describe new features, components, contexts, helpers, options, UI controls, or user-visible behavior.

            ### Changed
            Describe updates to existing behavior, components, data flow, filtering, rendering, layout, or state handling.

            ### Testing
            Mention whether automated tests were added or not.
            Provide a short note about manual testing focus.

            ### Review Notes
            Mention technical risks or important review points.

            ==================================================
            WRITING STYLE
            ==================================================

            - Use natural language.
            - Be specific and concrete.
            - Do not be too short.
            - Do not overuse file names.
            - Do not produce generic filler.
            - Do not say "review the diff for details" unless you also explain the actual details.
            - Do not invent business requirements that are not supported by the diff.
            - If something is inferred from the code, phrase it as an inference.
            - Keep markdown clean and easy to scan.
            `;

            try {
              const response = await fetch(process.env.AI_ENDPOINT, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`
                },
                body: JSON.stringify({
                  model: process.env.AI_MODEL,
                  messages: [
                    {
                      role: "system",
                      content: "You analyze pull request diffs and return only valid JSON. You write clear, natural, detailed PR documentation for developers, reviewers, technical leads, and project managers."
                    },
                    {
                      role: "user",
                      content: prompt
                    }
                  ],
                  temperature: 0.2,
                  max_tokens: 6000,
                  response_format: { type: "json_object" }
                })
              });

              if (!response.ok) {
                throw new Error(`AI failed: ${response.status}`);
              }

              const data = await response.json();
              const content = data?.choices?.[0]?.message?.content;
              if (content) {
                const parsed = JSON.parse(content);
                if (parsed?.pr_description && parsed.pr_description.trim().length > 100) {
                  prDescription = parsed.pr_description.trim();
                }
                if (parsed?.changelog && parsed.changelog.trim().length > 50) {
                  changelog = parsed.changelog.replace(/^# Changelog\s*/i, "").trim();
                }
              }
            } catch (error) {
              core.warning(`AI failed: ${error.message}`);
            }

            core.setOutput("pr_description", prDescription);
            core.setOutput("changelog", changelog);

      - name: Update PR description
        uses: actions/github-script@v8
        env:
          PR_DESCRIPTION: ${{ steps.ai.outputs.pr_description }}
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: process.env.PR_DESCRIPTION
            });

      - name: Update CHANGELOG.md
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          NEW_CHANGELOG: ${{ steps.ai.outputs.changelog }}
        with:
          script: |
            const fs = require("fs");
            const changelogPath = "CHANGELOG.md";
            const prNumber = process.env.PR_NUMBER;
            const prTitle = process.env.PR_TITLE;
            const prAuthor = process.env.PR_AUTHOR;
            const newChangelog = (process.env.NEW_CHANGELOG || "").trim();
            const date = new Date().toISOString().split("T")[0];
            const startMarker = `<!-- PR-${prNumber}-CHANGELOG-START -->`;
            const endMarker = `<!-- PR-${prNumber}-CHANGELOG-END -->`;
            const newEntry = `${startMarker}
            ## PR #${prNumber} - ${prTitle}

            **Author:** @${prAuthor}
            **Date:** ${date}

            ${newChangelog}

            ---
            ${endMarker}`;

            let changelog = "";
            if (fs.existsSync(changelogPath)) {
              changelog = fs.readFileSync(changelogPath, "utf8").trim();
            }
            if (!changelog) {
              changelog = "# Changelog\n\nAll notable changes to this project will be documented in this file.\n\n---";
            }

            const existingEntryRegex = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`, "m");
            if (existingEntryRegex.test(changelog)) {
              changelog = changelog.replace(existingEntryRegex, newEntry);
            } else {
              const titleRegex = /^# Changelog\s*\n*/;
              if (titleRegex.test(changelog)) {
                changelog = changelog.replace(titleRegex, `# Changelog\n\n${newEntry}\n\n`);
              } else {
                changelog = `# Changelog\n\n${newEntry}\n\n${changelog}`;
              }
            }

            fs.writeFileSync(changelogPath, `${changelog.trim()}\n`);

      - name: Commit and push CHANGELOG
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "docs: update CHANGELOG.md for PR #${{ github.event.pull_request.number }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const summary = `✨ **PR Analysis Complete**
            - **Files**: ${{ fromJson(steps.changes.outputs.stats).fileCount }}
            - **Changes**: +${{ fromJson(steps.changes.outputs.stats).additions }}/-${{ fromJson(steps.changes.outputs.stats).deletions }}
            - **Changelog**: Updated

            See description for details.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            }).catch(() => {});
