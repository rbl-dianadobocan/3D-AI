name: PR AI Docs
#test
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-pr-docs:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Collect detailed PR changes with full diffs
        id: changes
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            // Extract detailed information from diffs
            const analyzedFiles = files.map((f) => {
              const patch = f.patch || "";
              const lines = patch.split('\n');
              
              // Detect change types based on content
              let changeType = 'modified';
              if (f.status === 'added') changeType = 'added';
              else if (f.status === 'removed') changeType = 'deleted';
              else if (f.status === 'renamed') changeType = 'renamed';
              
              // Extract meaningful context from patch
              const addedLines = lines.filter(l => l.startsWith('+')).map(l => l.slice(1));
              const removedLines = lines.filter(l => l.startsWith('-')).map(l => l.slice(1));
              
              // Detect what was changed (function names, imports, config, etc.)
              const functionPattern = /^[\s]*(async\s+)?(function|const|let|class|export|interface|type)\s+([a-zA-Z_$][a-zA-Z0-9_$]*)/;
              const importPattern = /^[\s]*(import|require)\s+/;
              const configPattern = /\.(json|yaml|yml|toml|config|env|properties)$/i;
              
              const addedFunctions = addedLines
                .map(l => l.match(functionPattern)?.[3])
                .filter(Boolean);
              const removedFunctions = removedLines
                .map(l => l.match(functionPattern)?.[3])
                .filter(Boolean);
              const hasImportChanges = addedLines.some(l => l.match(importPattern)) || 
                                       removedLines.some(l => l.match(importPattern));
              const isConfigFile = configPattern.test(f.filename);
              
              return {
                filename: f.filename,
                status: f.status,
                changeType: changeType,
                additions: f.additions,
                deletions: f.deletions,
                patch: patch.slice(0, 10000),
                summary: {
                  isConfigFile,
                  hasImportChanges,
                  addedFunctions: addedFunctions.slice(0, 5),
                  removedFunctions: removedFunctions.slice(0, 5),
                  linesAdded: addedLines.length,
                  linesRemoved: removedLines.length
                }
              };
            });

            const totalAdditions = analyzedFiles.reduce((sum, f) => sum + f.additions, 0);
            const totalDeletions = analyzedFiles.reduce((sum, f) => sum + f.deletions, 0);
            
            // Categorize files by type
            const categorized = {
              frontend: analyzedFiles.filter(f => /\.(tsx?|jsx?)$/i.test(f.filename) && !/test|spec/.test(f.filename)),
              styling: analyzedFiles.filter(f => /\.(css|scss|sass|less)$/i.test(f.filename)),
              config: analyzedFiles.filter(f => f.summary.isConfigFile),
              tests: analyzedFiles.filter(f => /test|spec/i.test(f.filename)),
              backend: analyzedFiles.filter(f => /\.(py|js|ts|java|cs|rb|go|rs)$/i.test(f.filename) && !/test|spec/.test(f.filename) && !/(tsx?|jsx?)$/.test(f.filename)),
              other: analyzedFiles.filter(f => !/(\.tsx?|\.jsx?|\.css|\.scss|\.sass|\.less|test|spec|json|yaml|yml|toml|config|env|properties)$/i.test(f.filename))
            };

            core.setOutput("changes_json", JSON.stringify(analyzedFiles));
            core.setOutput("categorized_json", JSON.stringify(categorized));
            core.setOutput("stats", JSON.stringify({
              fileCount: analyzedFiles.length,
              additions: totalAdditions,
              deletions: totalDeletions,
              frontendFiles: categorized.frontend.length,
              backendFiles: categorized.backend.length,
              configFiles: categorized.config.length,
              testFiles: categorized.tests.length,
              styleFiles: categorized.styling.length
            }));

      - name: Generate comprehensive PR analysis with AI
        id: ai
        uses: actions/github-script@v8
        env:
          CHANGES_JSON: ${{ steps.changes.outputs.changes_json }}
          CATEGORIZED_JSON: ${{ steps.changes.outputs.categorized_json }}
          STATS_JSON: ${{ steps.changes.outputs.stats }}
          AI_MODEL: gpt-4.1-mini
          AI_ENDPOINT: https://models.inference.ai.azure.com/chat/completions
        with:
          script: |
            const changes = JSON.parse(process.env.CHANGES_JSON || "[]");
            const categorized = JSON.parse(process.env.CATEGORIZED_JSON || "{}");
            const stats = JSON.parse(process.env.STATS_JSON || "{}");

            // Enhanced fallback with detailed information
            const generateDetailedFallback = () => {
              const sections = ["## Summary"];
              
              sections.push(`This PR contains **${stats.fileCount} file changes** with **${stats.additions} additions** and **${stats.deletions} deletions**.`);
              
              if (stats.frontendFiles > 0) sections.push(`- **Frontend**: ${stats.frontendFiles} file(s) modified`);
              if (stats.backendFiles > 0) sections.push(`- **Backend**: ${stats.backendFiles} file(s) modified`);
              if (stats.configFiles > 0) sections.push(`- **Configuration**: ${stats.configFiles} file(s) modified`);
              if (stats.styleFiles > 0) sections.push(`- **Styling**: ${stats.styleFiles} file(s) modified`);
              if (stats.testFiles > 0) sections.push(`- **Tests**: ${stats.testFiles} file(s) modified`);
              
              sections.push("");
              sections.push("## What Changed");
              
              // Group changes by category
              if (categorized.frontend?.length > 0) {
                sections.push("### Frontend Components");
                categorized.frontend.slice(0, 10).forEach(f => {
                  let detail = `- **${f.filename}** (${f.status})`;
                  if (f.summary.addedFunctions.length > 0) {
                    detail += ` - Added: ${f.summary.addedFunctions.join(', ')}`;
                  }
                  if (f.summary.hasImportChanges) {
                    detail += ` - Dependencies updated`;
                  }
                  detail += ` (+${f.additions}/-${f.deletions})`;
                  sections.push(detail);
                });
              }
              
              if (categorized.backend?.length > 0) {
                sections.push("### Backend Logic");
                categorized.backend.slice(0, 10).forEach(f => {
                  let detail = `- **${f.filename}** (${f.status})`;
                  if (f.summary.addedFunctions.length > 0) {
                    detail += ` - Added: ${f.summary.addedFunctions.join(', ')}`;
                  }
                  detail += ` (+${f.additions}/-${f.deletions})`;
                  sections.push(detail);
                });
              }
              
              if (categorized.styling?.length > 0) {
                sections.push("### Styling & UI");
                categorized.styling.forEach(f => {
                  sections.push(`- **${f.filename}** (+${f.additions}/-${f.deletions})`);
                });
              }
              
              if (categorized.config?.length > 0) {
                sections.push("### Configuration");
                categorized.config.forEach(f => {
                  sections.push(`- **${f.filename}** - Configuration updated (+${f.additions}/-${f.deletions})`);
                });
              }
              
              if (categorized.tests?.length > 0) {
                sections.push("### Tests");
                categorized.tests.slice(0, 10).forEach(f => {
                  sections.push(`- **${f.filename}** (+${f.additions}/-${f.deletions})`);
                });
              }
              
              sections.push("");
              sections.push("## Technical Details");
              sections.push("- Review the diff details for implementation specifics");
              
              if (categorized.frontend?.length > 0 && categorized.frontend.some(f => f.summary.hasImportChanges)) {
                sections.push("- Component dependencies have been updated");
              }
              if (categorized.config?.length > 0) {
                sections.push("- Configuration files modified - ensure environment is properly configured");
              }
              if (stats.testFiles > 0) {
                sections.push(`- Tests updated (${stats.testFiles} file(s))`);
              }
              
              sections.push("");
              sections.push("## Testing");
              if (stats.testFiles > 0) {
                sections.push(`- ✓ Test files included (${stats.testFiles} file(s) modified)`);
                sections.push("- Run the test suite to validate changes: `npm test` or equivalent");
              } else {
                sections.push("- No automated tests were detected in this diff");
              }
              sections.push("- Manual validation recommended for all modified components");
              
              if (categorized.frontend?.length > 0) {
                sections.push("- Test frontend components: render, interaction, and responsive design");
              }
              if (categorized.backend?.length > 0) {
                sections.push("- Test backend logic: API endpoints, data processing, error handling");
              }
              
              sections.push("");
              sections.push("## Risks and Review Notes");
              
              const risks = [];
              if (stats.deletions > stats.additions * 2) {
                risks.push("- Large number of deletions - verify removed code is no longer needed");
              }
              if (categorized.config?.length > 0) {
                risks.push("- Configuration changes may affect runtime behavior - review carefully");
              }
              if (categorized.backend?.length > stats.frontendFiles && stats.frontendFiles === 0) {
                risks.push("- Backend changes without corresponding frontend updates - verify data contracts");
              }
              if (!stats.testFiles || stats.testFiles === 0) {
                risks.push("- No tests included - additional manual testing required");
              }
              
              if (risks.length === 0) {
                risks.push("- No major risks identified - standard code review recommended");
              }
              
              sections.push(risks.join("\n"));
              
              return sections.join("\n");
            };

            const generateDetailedChangelog = () => {
              const sections = ["# Changelog"];
              
              sections.push("");
              sections.push("## Added");
              const addedItems = changes
                .filter(f => f.status === 'added')
                .map(f => `- ${f.filename}`);
              
              const newFunctions = changes
                .flatMap(f => f.summary.addedFunctions.map(fn => `- New function: \`${fn}\` in ${f.filename}`))
                .slice(0, 5);
              
              if (addedItems.length > 0 || newFunctions.length > 0) {
                sections.push(...addedItems);
                sections.push(...newFunctions);
              } else {
                sections.push("- No new files or functions added");
              }
              
              sections.push("");
              sections.push("## Changed");
              const changedItems = changes
                .filter(f => f.status === 'modified')
                .map(f => {
                  let detail = `- ${f.filename}`;
                  if (f.summary.hasImportChanges) detail += " (dependencies updated)";
                  return detail;
                });
              
              if (changedItems.length > 0) {
                sections.push(...changedItems);
              } else {
                sections.push("- No files modified");
              }
              
              sections.push("");
              sections.push("## Fixed");
              sections.push("- See individual commit messages for bug fixes");
              
              sections.push("");
              sections.push("## Technical");
              const technical = [];
              if (categorized.config?.length > 0) {
                technical.push(`- Configuration updated (${categorized.config.length} file(s))`);
              }
              if (changes.some(f => f.summary.hasImportChanges)) {
                technical.push("- Dependencies or imports updated");
              }
              if (stats.testFiles > 0) {
                technical.push(`- Test coverage updated (${stats.testFiles} file(s))`);
              }
              
              if (technical.length > 0) {
                sections.push(...technical);
              } else {
                sections.push("- No breaking technical changes");
              }
              
              sections.push("");
              sections.push("## Notes");
              sections.push(`- Total changes: ${stats.fileCount} files, +${stats.additions}/-${stats.deletions} lines`);
              if (stats.frontendFiles > 0) sections.push(`- Frontend impact: ${stats.frontendFiles} file(s)`);
              if (stats.backendFiles > 0) sections.push(`- Backend impact: ${stats.backendFiles} file(s)`);
              
              return sections.join("\n");
            };

            let prDescription = generateDetailedFallback();
            let changelog = generateDetailedChangelog();

            // Build comprehensive diff content for AI
            const diffContent = changes.map((f, idx) => {
              return `FILE ${idx + 1}: ${f.filename}
STATUS: ${f.status}
STATS: +${f.additions}/-${f.deletions}
CONTENT:
${f.patch}
---`;
            }).join('\n\n');

            // Prepare ENHANCED prompt for AI analysis
            const prompt = `You are a senior software engineer expert at analyzing GitHub Pull Requests and writing technical documentation.

CRITICAL INSTRUCTION: You MUST analyze the ACTUAL DIFF CONTENT below, not just file names or statistics.
Extract specific changes, functions, logic modifications, and their impact.
Provide detailed, actionable analysis that helps reviewers understand exactly what changed and why.

Return ONLY valid JSON with exactly these keys (no markdown formatting outside JSON):
{
  "pr_description": "markdown content",
  "changelog": "markdown content"
}

=== PR CONTEXT ===
Title: ${context.payload.pull_request.title}
Body: ${context.payload.pull_request.body || "(no description)"}

Stats:
- Total Files: ${stats.fileCount}
- Total Additions: ${stats.additions}
- Total Deletions: ${stats.deletions}
- Frontend Files: ${stats.frontendFiles}
- Backend Files: ${stats.backendFiles}
- Config Files: ${stats.configFiles}
- Test Files: ${stats.testFiles}

=== ACTUAL DIFF CONTENT TO ANALYZE ===
${diffContent}

=== INSTRUCTIONS FOR PR DESCRIPTION ===
Structure your pr_description with these sections (markdown format):

## Summary
- Write 2-4 sentences explaining the PURPOSE of this PR
- What problem does it solve? What improvement does it introduce?
- Which part of the application is affected?

## What Changed
- List changes organized by category (Frontend/Backend/Config/Tests)
- For EACH change, explain WHAT was modified and WHY it matters
- Example: "Updated navigation component to use new routing hooks - improves performance and maintainability"
- Include specific function/component names when relevant
- Mention dependency updates if present

## Technical Details
- Extract specific implementation details from the diff
- What new functions, components, or APIs were added?
- What existing logic was changed?
- Any important refactoring or optimization?
- Configuration changes and their impact?

## Testing
- Based on the diff, what testing is needed?
- If test files are included, mention them specifically
- Suggest specific manual test scenarios
- Example: "Test user login flow with new auth middleware"

## Risks and Review Notes
- Identify potential risks or edge cases from the diff
- Performance implications?
- Breaking changes?
- Dependencies on other systems?
- If no risks: "No major risks identified"

=== INSTRUCTIONS FOR CHANGELOG ===
Structure your changelog with these sections:

# Changelog

## Added
- New files, functions, components, or features added
- Use specific names from the diff

## Changed
- Modified behavior, refactored code, updated UI
- Be specific about what changed and how

## Fixed
- Bug fixes with specific descriptions

## Technical
- Internal changes, dependency updates, CI/CD changes
- Configuration file modifications

## Notes
- Anything reviewers should know
- Breaking changes or important considerations

=== CRITICAL RULES ===
1. Analyze the DIFF CONTENT, not just file metadata
2. Be SPECIFIC - mention actual function/component names from diff
3. Explain WHY changes matter, not just WHAT changed
4. Extract meaningful technical details from the code
5. Do NOT invent changes - only describe what you see in diff
6. Make it useful for code reviewers
7. Return ONLY JSON, no markdown outside the JSON structure
8. Keep explanations concise but informative`;

            try {
              const response = await fetch(process.env.AI_ENDPOINT, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`
                },
                body: JSON.stringify({
                  model: process.env.AI_MODEL,
                  messages: [
                    {
                      role: "system",
                      content: "You are GitHub Copilot, an expert code reviewer and technical documentation writer. Analyze diffs carefully and provide detailed, actionable analysis. Always return valid JSON as requested."
                    },
                    {
                      role: "user",
                      content: prompt
                    }
                  ],
                  temperature: 0.4,
                  max_tokens: 3000,
                  response_format: {
                    type: "json_object"
                  }
                })
              });

              if (!response.ok) {
                const errorText = await response.text();
                core.warning(`AI request failed with status ${response.status}: ${errorText}`);
                throw new Error(`AI request failed with status ${response.status}`);
              }

              const data = await response.json();
              const content = data?.choices?.[0]?.message?.content;
              
              if (content) {
                try {
                  const parsed = JSON.parse(content);
                  
                  if (parsed?.pr_description && parsed.pr_description.trim().length > 100) {
                    prDescription = parsed.pr_description;
                    core.info("✓ AI analysis successful - detailed PR description generated");
                  }
                  
                  if (parsed?.changelog && parsed.changelog.trim().length > 50) {
                    changelog = parsed.changelog;
                    core.info("✓ AI changelog generated");
                  }
                } catch (parseError) {
                  core.warning(`Failed to parse AI response: ${parseError.message}`);
                }
              }
            } catch (error) {
              core.warning(`AI generation failed, using enhanced fallback: ${error.message}`);
              core.info("ℹ️ Fallback provides detailed analysis from file changes and diff content");
            }

            core.setOutput("pr_description", prDescription);
            core.setOutput("changelog", changelog);

      - name: Update PR description
        uses: actions/github-script@v8
        env:
          PR_DESCRIPTION: ${{ steps.ai.outputs.pr_description }}
        with:
          script: |
            const body = process.env.PR_DESCRIPTION;
            
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: body
            });
            
            core.info("✓ PR description updated with detailed analysis");

      - name: Checkout main branch to update CHANGELOG.md
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Read existing CHANGELOG.md
        id: read_changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            echo "changelog_exists=true" >> $GITHUB_OUTPUT
            cat CHANGELOG.md > /tmp/changelog.txt
          else
            echo "changelog_exists=false" >> $GITHUB_OUTPUT
            echo "# Changelog

All notable changes to this project will be documented in this file.

---" > /tmp/changelog.txt
          fi

      - name: Update and append to CHANGELOG.md
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          NEW_CHANGELOG: ${{ steps.ai.outputs.changelog }}
        run: |
          # Create the PR entry with header
          cat > /tmp/pr_entry.txt << 'EOF'
          ## PR #${{ env.PR_NUMBER }} - ${{ env.PR_TITLE }}
          **Author**: @${{ env.PR_AUTHOR }}  
          **Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')

          ${{ env.NEW_CHANGELOG }}

          ---

          EOF
          
          # Read existing changelog
          EXISTING=$(cat /tmp/changelog.txt)
          
          # Combine: new entry + existing changelog
          {
            cat /tmp/pr_entry.txt
            echo ""
            echo "$EXISTING"
          } > CHANGELOG.md
          
          # Show the updated file
          echo "✓ CHANGELOG.md updated:"
          head -50 CHANGELOG.md

      - name: Commit and push CHANGELOG.md to main
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "ℹ️ No changelog changes to commit"
            exit 0
          fi

          git commit -m "chore: update CHANGELOG.md - PR #${{ github.event.pull_request.number }}"
          git push origin main
          
          echo "✓ CHANGELOG.md updated and pushed to main"

      - name: Comment on PR with status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const summary = `
            ✨ **Automated PR Analysis Complete**
            
            - **Files analyzed**: ${{ fromJson(steps.changes.outputs.stats).fileCount }}
            - **Lines changed**: +${{ fromJson(steps.changes.outputs.stats).additions }}/-${{ fromJson(steps.changes.outputs.stats).deletions }}
            - **Changelog**: Updated in main branch (CHANGELOG.md)
            
            👆 See the PR description above for detailed analysis.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            }).catch(err => core.warning("Could not post comment: " + err.message));
